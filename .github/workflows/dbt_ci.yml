name: dbt_ci_pipeline

on: 
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  slim_ci_job:
    runs-on: ubuntu-latest
    environment: snowflake_trial
    env:
      SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.10'

      - name: Install dependencies
        run: |
           pip install --upgrade pip
           pip install dbt-snowflake
    
      - name: Install dbt dependencies
        run: dbt deps
    
      - name: Set up dbt profiles.yml (CI Isolation)
        run: |
          mkdir -p ~/.dbt 
          cat << 'EOF' > ~/.dbt/profiles.yml 
          olist_analytics:
            outputs:
              ci_target:
                type: snowflake
                account: ${{ secrets.SF_ACCOUNT }}
                user: ${{ secrets.SF_USER }}
                private_key: "{{env_var('SF_PRIVATE_KEY')}}"
                role: ${{ secrets.SF_ROLE }}
                warehouse: ${{ secrets.SF_WAREHOUSE }}
                database: KAGGLE_OLIST_DEV
                schema: DBT_CI_${{ github.event.number }}
            target: ci_target
          EOF
    
      - name: Restore Production dbt State Manifest
        uses: actions/cache/restore@v4
        with: 
          path: prod_state/manifest.json
          key: dbt-manifest-main
    
      - name: Run Slim CI (Modified Delta Only)
        run: |
          dbt build --select state:modified+ --state prod_state --profiles-dir ~/.dbt
          