version: 2

models:
  - name: stg_OLIST_ORDERS_DATASET
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - unique
          - not_null
  - name: stg_OLIST_CUSTOMERS_DATASET
    columns: 
      - name: customer_id 
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null
  - name: stg_OLIST_ORDER_ITEMS_DATASET 
    columns:
      - name: order_id
        tests:
            - not_null
      - name: order_item_id
        tests:
            - not_null
    tests:
        - dbt_utils.unique_combination_of_columns:
            arguments:
              combination_of_columns:
                - order_id
                - order_item_id
  - name: stg_OLIST_PRODUCTS_DATASET 
    columns:
      - name: product_id
        tests:
            - unique
            - not_null
  - name: stg_OLIST_SELLERS_DATASET 
    columns:
      - name: seller_id
        tests:
            - unique
            - not_null 
  - name: stg_OLIST_ORDER_PAYMENTS_DATASET 
    columns:
      - name: order_id
        tests:
            - not_null
      - name: payment_sequential
        tests:
            - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id 
              - payment_sequential
  - name: stg_COMMON_CALENDER