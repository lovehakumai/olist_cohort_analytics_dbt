          - name: payment_sequential
            data_type: number
          - name: payment_type
            data_type: varchar
          - name: payment_installments
            data_type: number
          - name: payment_value
            data_type: float

      - name: olist_order_reviews_dataset
        columns:
          - name: review_id
            data_type: varchar
          - name: order_id
            data_type: varchar
          - name: review_score
            data_type: number
          - name: review_comment_title
            data_type: varchar
          - name: review_comment_message
            data_type: varchar
          - name: review_creation_date
            data_type: varchar
          - name: review_answer_timestamp
            data_type: varchar

      - name: olist_orders_dataset
        columns:
          - name: order_id
            data_type: varchar
          - name: customer_id
            data_type: varchar
          - name: order_status
            data_type: varchar
          - name: order_purchase_timestamp
            data_type: varchar
          - name: order_approved_at
            data_type: varchar
          - name: order_delivered_carrier_date
            data_type: varchar
          - name: order_delivered_customer_date
            data_type: varchar
          - name: order_estimated_delivery_date
            data_type: varchar

      - name: olist_products_dataset
        columns:
          - name: product_id
            data_type: varchar
          - name: product_category_name
            data_type: varchar
          - name: product_name_lenght
            data_type: number
          - name: product_description_lenght
            data_type: number
          - name: product_photos_qty
            data_type: number
          - name: product_weight_g
            data_type: number
          - name: product_length_cm
            data_type: number
          - name: product_height_cm
            data_type: number
          - name: product_width_cm
            data_type: number

      - name: olist_sellers_dataset
        columns:
          - name: seller_id
            data_type: varchar
          - name: seller_zip_code_prefix
            data_type: number
          - name: seller_city
            data_type: varchar
          - name: seller_state
            data_type: varchar

      - name: product_category_name_translation
        columns:
          - name: product_category_name
            data_type: varchar
          - name: product_category_name_english
            data_type: varchar


