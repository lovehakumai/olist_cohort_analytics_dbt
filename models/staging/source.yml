version: 2

sources:
  - name: olist_raw
    tables:
      - name: olist_closed_deals_dataset
        columns:
          - name: mql_id
            data_type: varchar
          - name: seller_id
            data_type: varchar
          - name: sdr_id
            data_type: varchar
          - name: sr_id
            data_type: varchar
          - name: won_date
            data_type: varchar
          - name: business_segment
            data_type: varchar
          - name: lead_type
            data_type: varchar
          - name: lead_behaviour_profile
            data_type: varchar
          - name: has_company
            data_type: boolean
          - name: has_gtin
            data_type: boolean
          - name: average_stock
            data_type: varchar
          - name: business_type
            data_type: varchar
          - name: declared_product_catalog_size
            data_type: float
          - name: declared_monthly_revenue
            data_type: float

      - name: olist_customers_dataset
        columns:
          - name: customer_id
            data_type: varchar
          - name: customer_unique_id
            data_type: varchar
          - name: customer_zip_code_prefix
            data_type: number
          - name: customer_city
            data_type: varchar
          - name: customer_state
            data_type: varchar

      - name: olist_geolocation_dataset
        columns:
          - name: geolocation_zip_code_prefix
            data_type: number
          - name: geolocation_lat
            data_type: float
          - name: geolocation_lng
            data_type: float
          - name: geolocation_city
            data_type: varchar
          - name: geolocation_state
            data_type: varchar

      - name: olist_marketing_qualified_leads_dataset
        columns:
          - name: mql_id
            data_type: varchar
          - name: first_contact_date
            data_type: varchar
          - name: landing_page_id
            data_type: varchar
          - name: origin
